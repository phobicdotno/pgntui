[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pgntui"
version = "0.6.0"
description = "Cross-platform TUI for NMEA 2000 with canboat decoding and pluggable drivers"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "phobicdotno" }]
keywords = ["nmea2000", "n2k", "tui", "marine", "canboat"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console :: Curses",
  "License :: OSI Approved :: MIT License",
  "Operating System :: MacOS",
  "Operating System :: POSIX :: Linux",
  "Operating System :: Microsoft :: Windows",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Terminals",
]
dependencies = [
  "textual>=8.0",
  "pyserial>=3.5",
  "platformdirs>=4.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "pytest-textual-snapshot>=1.0",
  "ruff>=0.6",
  "mypy>=1.10",
]
dist = [
  "pyinstaller>=6.6",
]

[project.scripts]
pgntui = "pgntui.__main__:main"

[project.urls]
Homepage = "https://github.com/phobicdotno/pgntui"
Source = "https://github.com/phobicdotno/pgntui"
"Bug Tracker" = "https://github.com/phobicdotno/pgntui/issues"
Changelog = "https://github.com/phobicdotno/pgntui/releases"

[project.entry-points."pgntui.drivers"]
actisense-ngt1 = "pgntui.drivers.actisense:NGT1Driver"
file-replay = "pgntui.drivers.replay:FileReplayDriver"

[tool.hatch.build.targets.wheel]
packages = ["src/pgntui"]

[tool.hatch.build.targets.wheel.force-include]
# Keep complete: tests/test_packaging.py asserts every non-.py data file
# under decode/, themes/builtin/ and examples/ has an entry here.
