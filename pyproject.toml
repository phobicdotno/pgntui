"src/pgntui/themes/builtin/amber-crt.json" = "pgntui/themes/builtin/amber-crt.json"
"src/pgntui/themes/builtin/dark.json" = "pgntui/themes/builtin/dark.json"
"src/pgntui/themes/builtin/green-phosphor.json" = "pgntui/themes/builtin/green-phosphor.json"
"src/pgntui/themes/builtin/light.json" = "pgntui/themes/builtin/light.json"
"src/pgntui/themes/builtin/matrix.json" = "pgntui/themes/builtin/matrix.json"
"src/pgntui/themes/builtin/mono-ascii.json" = "pgntui/themes/builtin/mono-ascii.json"
"src/pgntui/themes/builtin/rainbow-disco.json" = "pgntui/themes/builtin/rainbow-disco.json"
"src/pgntui/examples/config.toml" = "pgntui/examples/config.toml"
"src/pgntui/examples/containers/1-nav.json" = "pgntui/examples/containers/1-nav.json"
"src/pgntui/examples/containers/2-engine.json" = "pgntui/examples/containers/2-engine.json"
